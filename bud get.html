<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Budget Planner</title>
  <style>
    /* Global Reset & Typography */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      padding: 3rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    main {
      width: 100%;
      max-width: 700px;
    }

    /* Minimalist Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #888888;
      font-size: 1rem;
    }

    /* App Cards */
    .card {
      background-color: #133009;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Inputs and Forms */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888888;
    }

    input {
      background-color: #000000;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #ffffff;
    }

    /* Dynamic Grid Layout for Add Form */
    .activity-form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 1rem;
      align-items: flex-end;
    }

    /* Primary Actions */
    button[type="submit"] {
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      height: 47px;
      transition: background-color 0.2s;
    }

    button[type="submit"]:hover {
      background-color: #e5e5e5;
    }

    /* Native Lists */
    .activity-list {
      list-style: none;
      margin-bottom: 2rem;
    }

    .activity-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .activity-list li:last-child {
      border-bottom: none;
    }

    .info-block strong {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .info-block span {
      font-size: 0.85rem;
      color: #888888;
    }

    .action-block {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .cost {
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 700;
    }

    /* Red Action State */
    .btn-remove {
      background: transparent;
      color: #ff3333;
      border: 1px solid rgba(255, 51, 51, 0.3);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-remove:hover {
      background-color: #ff3333;
      color: #ffffff;
      border-color: #ff3333;
    }

    /* Budget Progress Architecture */
    .progress-container {
      margin-top: 1.5rem;
      border-top: 1px dashed rgba(255, 255, 255, 0.2);
      padding-top: 1.5rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
      color: #cccccc;
    }

    .progress-bar {
      background-color: #000000;
      border: 1px solid rgba(255, 255, 255, 0.1);
      height: 12px;
      border-radius: 99px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-fill {
      height: 100%;
      background-color: #ffffff;
      width: 45%; /* Dummy state value */
    }

    /* Red warning modifier */
    .progress-fill.alert {
      background-color: #ff3333;
    }

    .alert-text {
      color: #ff3333;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .success-text {
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Responsive Breaks */
    @media (max-width: 680px) {
      .activity-form {
        grid-template-columns: 1fr;
      }
      button[type="submit"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <main>
    <header>
      <h1>Activity Budget Planner</h1>
      <p>Allocate your budget across activities and stay on track.</p>
    </header>

    <section class="card">
      <h2>Total Budget</h2>
      <div class="form-group" style="max-width: 300px;">
        <label for="total">What is your total budget?</label>
        <input id="total" type="number" min="0" placeholder="e.g. 1000" value="1000">
      </div>
    </section>

    <section class="card">
      <h2>Add Activity</h2>
      <form class="activity-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="name">Activity</label>
          <input id="name" type="text" placeholder="Groceries">
        </div>
        <div class="form-group">
          <label for="budget">Budget</label>
          <input id="budget" type="number" min="0" placeholder="100">
        </div>
        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input id="deadline" type="text" placeholder="3 days">
        </div>
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="card">
      <h2>Activity Summary</h2>
      
      <ul class="activity-list">
        <li>
          <div class="info-block">
            <strong>Groceries</strong>
            <span>Deadline: 3 days</span>
          </div>
          <div class="action-block">
            <span class="cost">150</span>
            <button type="button" class="btn-remove">Remove</button>
          </div>
        </li>
        <li>
          <div class="info-block">
            <strong>Flight Booking</strong>
            <span>Deadline: 2 weeks</span>
          </div>
          <div class="action-block">
            <span class="cost">900</span>
            <button type="button" class="btn-remove">Remove</button>
          </div>
        </li>
      </ul>

      <div class="progress-container">
        <div class="progress-meta">
          <span>Allocated</span>
          <span>1050 / 1000</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill alert" style="width: 100%;"></div>
        </div>
        <p class="alert-text">
          ⚠️ You have exceeded your total budget by 50.
        </p>
      </div>
    </section>
  </main>

</body>
</html>
